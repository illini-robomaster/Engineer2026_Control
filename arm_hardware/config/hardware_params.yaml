uart_bridge_node:
  ros__parameters:
    # ── UART port ──────────────────────────────────────────────────────────────
    # Set this to the correct Orange Pi UART device connected to the MCU.
    # Common values: /dev/ttyCH341USB0 (USB-UART dongle), /dev/ttyS3 (built-in),
    #                /dev/ttyAMA0, /dev/ttyUSB0
    # To find it: ls /dev/tty* before and after plugging in the USB-UART cable.
    port: "/dev/ttyCH341USB0"
    baud_rate: 115200
    serial_timeout: 0.05    # seconds, read timeout per call

    # ── Joint names & order ───────────────────────────────────────────────────
    # Must match the order the STM32 firmware expects in the CSV frame.
    joint_names:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
      - Joint5
      - Joint6

    # ── Wire protocol ─────────────────────────────────────────────────────────
    # use_crc_framing: true  (default, recommended)
    #   TX: "$d1.ddd,...,d6.ddd*CCCC\n"   (CRC16-MODBUS, 4-char hex suffix)
    #   RX: same framed format; frames failing CRC are dropped with a WARN log.
    #
    # use_crc_framing: false  (legacy / MCU firmware not yet updated)
    #   TX: "d1.ddd,...,d6.ddd\n"         (plain CSV, no header or checksum)
    #   RX: same plain CSV format.
    #   Use this temporarily while updating MCU firmware to the framed protocol.
    use_crc_framing: true     # MCU sends $payload*CCCC\n  — CRC16-MODBUS framing

    # debug_rx: print every raw line and parsed result to the ROS log.
    # Useful for verifying the MCU is sending correctly.  Disable in production.
    debug_rx: false

    # Rate at which commands are sent to the STM32 (Hz).
    # Should be <= the rate at which MoveIt Servo publishes trajectories (~30 Hz).
    send_rate_hz: 50.0

    # Stale-command timeout: stop sending if no new trajectory received in this time.
    command_timeout_s: 0.5

    # ── Feedback ──────────────────────────────────────────────────────────────
    # Publish actual joint angles received from STM32 on /real_joint_states.
    publish_real_joint_states: true

    # Also republish STM32 feedback as /joint_states to feed MoveIt's planning
    # scene with actual (not commanded) positions.  Only enable this when the
    # STM32 feedback is reliable and low-latency; otherwise MoveIt may plan
    # incorrectly due to noise.
    override_joint_states: false
