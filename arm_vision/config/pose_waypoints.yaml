waypoints:
  defaults:
    frame: relative_start
    hold_s: 0.30
    timeout_s: 6.0
    pos_tolerance_mm: 8.0
    ori_tolerance_deg: 4.0

  sequences:
    small_box_6d:
      description: Small translational box with light wrist rotation. Starts from the current 6D pose.
      waypoints:
        - name: start_hold
          position: [0.000, 0.000, 0.000]
          rpy_deg: [0.0, 0.0, 0.0]
        - name: up_left
          position: [0.000, 0.020, 0.025]
          rpy_deg: [0.0, 8.0, 0.0]
        - name: up_right
          position: [0.000, -0.020, 0.025]
          rpy_deg: [0.0, -8.0, 0.0]
        - name: down_right
          position: [0.000, -0.020, -0.010]
          rpy_deg: [0.0, -8.0, 6.0]
        - name: down_left
          position: [0.000, 0.020, -0.010]
          rpy_deg: [0.0, 8.0, -6.0]
        - name: return_center
          position: [0.000, 0.000, 0.000]
          rpy_deg: [0.0, 0.0, 0.0]

    wrist_singularity_probe:
      description: Small pitch/yaw sweep intended to expose J5-near-zero singular behavior while keeping translation modest.
      waypoints:
        - name: settle
          position: [0.000, 0.000, 0.000]
          rpy_deg: [0.0, 0.0, 0.0]
          hold_s: 0.40
        - name: pitch_forward
          position: [0.010, 0.000, 0.015]
          rpy_deg: [0.0, 12.0, 0.0]
        - name: yaw_left
          position: [0.010, 0.015, 0.015]
          rpy_deg: [0.0, 12.0, 10.0]
        - name: yaw_right
          position: [0.010, -0.015, 0.015]
          rpy_deg: [0.0, 12.0, -10.0]
        - name: neutral
          position: [0.000, 0.000, 0.000]
          rpy_deg: [0.0, 0.0, 0.0]
