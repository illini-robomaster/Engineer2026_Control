################################################################################
# arm_teleop parameter file
#
# Three teleop modes (select with teleop_mode argument in bringup):
#
#   ik_direct (DEFAULT)
#     PyKDL LMA inverse kinematics, seeded from current joints.
#     Deterministic — always finds the nearest IK solution (minimum joint
#     motion).  Best for reaching a static or slow-moving target.
#
#   servo
#     DLS Jacobian velocity controller with null-space posture control.
#     Proportional — tracks a continuously moving target smoothly.
#     More complex but optimal for fast visual tracking.
#
#   moveit
#     OMPL path planning via MoveGroup action.
#     Collision-aware but slow (1 s planning budget) and stochastic.
#     NOT suitable for real-time teleop.  Use for scripted waypoints or
#     when collision avoidance is required.
################################################################################

# ─────────────────────────────────────────────────────────────────────────────
# ik_teleop_node  (teleop_mode:=ik_direct)
# ─────────────────────────────────────────────────────────────────────────────
ik_teleop_node:
  ros__parameters:
    host: "0.0.0.0"
    port: 9999

    base_frame: "base_link"
    ee_frame:   "End_Effector"

    # IK solve + publish rate.  60 Hz halves the worst-case stale-pose window
    # (33 ms → 16 ms).  IK solves in <2 ms so the 16 ms budget is ample.
    # Camera is still 30 fps, but the faster tick reduces wait after TCP arrival.
    publish_rate_hz: 60.0

    # Trajectory time_from_start.  One 60 Hz period — the arm controller
    # completes each waypoint before the next arrives, making motion feel live.
    # If the arm faults due to velocity limits, raise in 5 ms steps (0.038, 0.043…).
    traj_duration_s: 0.033   # 33 ms ~= 1x the 60 Hz period

    # Suppress IK re-solve when the commanded joints change by less than this.
    # Keep this small enough to preserve fine alignment once pose_alpha smoothing
    # is active, while still blocking encoder-noise chatter.
    joint_deadband_rad: 0.005

    # Reject IK solutions where any single joint would move more than this from
    # the current hardware position.  Catches configuration flips (e.g. J4 ±180°
    # wrist singularity) that are geometrically valid but physically undesirable.
    # 0.8 rad (≈46°) is tight enough to block J4 flips while still allowing
    # normal-speed motion.  The velocity limiter smooths the rest.
    # Set 0.0 to disable.
    max_joint_jump_rad: 0.8

    # Joint-space velocity limit (rad/s per joint).  When IK re-acquires a
    # solution after traversing an unreachable zone, the arm ramps smoothly
    # to the new target instead of snapping.  Keep this aligned with the
    # slowest declared joint max_velocity (3.0 rad/s) for conservative
    # behaviour on hardware.
    # Set 0.0 to disable.
    max_joint_vel_rad_s: 3.0

    # Halt if no TCP message received for this long (s).
    detection_timeout_s: 0.4

    # Set true to enforce the incoming quaternion (full 6D pose IK).
    # Required for assembly arc stages: the FSM provides exact orientation via
    # rotation_override for both P and Q arcs.  Without this, the IK is
    # position-only and the wrist is free to reorganize — causing branch flips
    # (snap) or singularity failures at the top of the Q-arc.
    # Fallback: if 6D IK fails, the node drops to position-only automatically.
    control_orientation: true

    # Weight applied to the orientation error rows in 6D mode.
    # 1.0 = equal weighting.  Increase (e.g. 2.0) if orientation lags behind
    # position; decrease (e.g. 0.5) if orientation causes instability.
    ori_weight: 1.0

    # [DEPRECATED — now unused]  J4 flip prevention is handled by the
    # max_joint_jump_rad guard in the control loop, not inside the solver.
    # Kept at 0.0 for parameter compatibility.
    ik_seed_regularization: 0.0

    # Static orientation offset applied to incoming target quaternion (right-multiplied).
    # Compensates for the mismatch between the teleop's zero orientation and the
    # URDF End_Effector frame (Joint6 has rpy="1.5707 0 1.5707" baked in).
    # Observed: EE is -90° around X at zero teleop RPY → offset = +90° around X.
    # Adjust sign/axis here if the residual is different on your hardware.
    ee_ori_offset_roll:  1.5707963   # +90° around X  (Rx correction)
    ee_ori_offset_pitch: 0.0
    ee_ori_offset_yaw:   0.0

    # Extra random seeds tried after deterministic seeds fail.
    # Higher values improve coverage near workspace edges at the cost of ~7 ms
    # worst-case per control tick (still well within the 16 ms budget at 60 Hz).
    n_random_seeds: 15

    # Velocity-adaptive EMA smoothing on incoming target pose.
    # pose_alpha:           alpha when stationary (suppress IK-noise jitter). 0.4 = heavy.
    # pose_alpha_moving:    alpha when moving fast (pass-through, no lag). 0.9 = light.
    # pose_alpha_threshold_m: per-tick Δpos (m) above which full moving-alpha is used.
    #   At 60 Hz, 0.002 m/tick ≈ 0.12 m/s — any deliberate SpaceMouse motion exceeds this.
    # Result: no lag during motion; jitter suppressed when hand is still.
    pose_alpha:             0.4
    pose_alpha_moving:      0.9
    pose_alpha_threshold_m: 0.002

    # Per-tick CSV debug log.  Set to a file path to enable (e.g. "/tmp/ik_debug.csv").
    # Captures target pose, IK result, joints, FK, orientation error per axis.
    # Leave empty to disable.
    debug_log: ""

    # Null-space posture control: secondary objective to keep joints near a
    # mid-range "elbow-up" posture without disturbing the primary EE position task.
    # Also biases pick_best seed selection away from straight-arm and wrist-flip
    # configurations when multiple IK branches are valid.
    # Only has effect in position-only mode (3D task, 6 joints → 3D null space).
    # Set nullspace_gain: 0.0 to disable.
    nullspace_gain: 0.5
    q_preferred: [0.0, 0.3, 1.5, 0.0, 0.0, 0.0]   # radians; keeps elbow off the zero-pose singular region

    joint_names:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
      - Joint5
      - Joint6

# ─────────────────────────────────────────────────────────────────────────────
# socket_teleop_node  (teleop_mode:=servo)
# ─────────────────────────────────────────────────────────────────────────────
socket_teleop_node:
  ros__parameters:
    host: "0.0.0.0"
    port: 9999

    ee_frame:   "End_Effector"
    base_frame: "base_link"

    # Proportional controller gains
    kp_linear:  15.0   # m/s per m of position error
    kp_angular:  5.0   # rad/s per rad of orientation error

    # Clamp Cartesian output to these speeds
    max_linear_speed:  0.6   # m/s
    max_angular_speed: 1.5   # rad/s

    # Deadband: suppress commands when error is below this
    deadband_pos_m:   0.010   # 10 mm
    deadband_rot_rad: 0.05    # ~2.9 degrees

    # Halt if no TCP message received for this long (s)
    detection_timeout_s: 0.4

    # Enable orientation control.  Set false until camera->robot orientation
    # frame is calibrated; position-only is more robust.
    control_orientation: true

    # ── DLS singularity-robust control ────────────────────────────────────
    # Nakamura-Hanafusa SR-inverse: lambda ramps 0 to lambda_max as sigma_min
    # drops below dls_sigma_threshold.
    dls_lambda_max:      0.2
    dls_sigma_threshold: 0.12

    # ── Null-space posture control ─────────────────────────────────────────
    # Secondary task: pull joints toward q_preferred without disturbing the
    # primary Cartesian task.  Keeps elbow up, avoids zero-pose singularity.
    nullspace_gain: 2.0
    q_preferred: [0.0, 0.3, 1.5, 0.0, 0.0, 0.0]

    # ── Target smoothing ───────────────────────────────────────────────────
    # EMA on incoming target pose.  0 = no smoothing.
    pose_alpha: 0.35

    joint_names:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
      - Joint5
      - Joint6
    joint_velocity_limits: [3.0, 3.0, 3.0, 4.0, 4.0, 5.0]   # rad/s

# ─────────────────────────────────────────────────────────────────────────────
# moveit_teleop_node  (teleop_mode:=moveit)
# ─────────────────────────────────────────────────────────────────────────────
moveit_teleop_node:
  ros__parameters:
    host: "0.0.0.0"
    port: 9999

    base_frame:      "base_link"
    ee_link:         "End_Effector"
    move_group_name: "arm"

    detection_timeout_s: 0.4
    replan_threshold_m:  0.03

    # OMPL planning time budget
    planning_time_s: 1.0

    velocity_scaling:     0.5
    acceleration_scaling: 0.3

    pos_tolerance_m:   0.005
    ori_tolerance_rad: 0.05

    # Position-only planning by default.  Set true only after camera->robot
    # orientation calibration is validated.
    control_orientation: true

# ─────────────────────────────────────────────────────────────────────────────
# keyboard_teleop_node  (manual debug, run in a separate terminal)
# ─────────────────────────────────────────────────────────────────────────────
keyboard_teleop_node:
  ros__parameters:
    base_frame: "base_link"
    ee_frame:   "End_Effector"

    linear_speed:  0.08   # m/s
    angular_speed: 0.3    # rad/s
    joint_speed:   0.3    # rad/s

    joint_names:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
      - Joint5
      - Joint6
