socket_teleop_node:
  ros__parameters:
    # TCP socket the arm_vision client connects to
    host: "0.0.0.0"   # bind all interfaces; use "127.0.0.1" for localhost only
    port: 9999

    # TF frame names
    ee_frame: "End_Effector"
    base_frame: "base_link"

    # Proportional controller gains (servo sends these as speed commands)
    kp_linear: 1.5      # m/s per m of position error
    kp_angular: 2.0     # rad/s per rad of orientation error

    # Clamp output to these max speeds (passed to moveit_servo)
    max_linear_speed: 0.25    # m/s
    max_angular_speed: 0.5    # rad/s

    # Deadband: suppress commands when pose error is below this threshold
    deadband_pos_m: 0.008      # 8 mm
    deadband_rot_rad: 0.05     # ~3 degrees

    # If no message is received for this many seconds, publish zero twist (halt servo)
    detection_timeout_s: 0.4

    # Whether to also control end-effector orientation from the received quaternion.
    # false = only position is controlled; orientation stays at whatever MoveIt last set.
    control_orientation: true

keyboard_teleop_node:
  ros__parameters:
    base_frame: "base_link"
    ee_frame: "End_Effector"

    # Linear and angular step sizes for keyboard Cartesian mode
    linear_speed: 0.08     # m/s
    angular_speed: 0.3     # rad/s

    # Joint jog step size
    joint_speed: 0.3       # rad/s

    # Joint names (order matches joints 1-6 for key selection)
    joint_names:
      - Joint1
      - Joint2
      - Joint3
      - Joint4
      - Joint5
      - Joint6
