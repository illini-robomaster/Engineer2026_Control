arm:
  kinematics_solver: pick_ik/PickIkPlugin
  kinematics_solver_timeout: 0.005  # 5ms — pick_ik is faster than KDL
  kinematics_solver_attempts: 3
  mode: global
  
  position_threshold: 0.001       # m — IK accepted when EE within 1 mm of target
  orientation_threshold: 0.01     # rad — ~0.57 deg orientation tolerance
