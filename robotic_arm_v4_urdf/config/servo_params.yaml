moveit_servo:
  use_gazebo: false
  status_topic: ~/status

  ## Input: TwistStamped on ~/delta_twist_cmds or JointJog on ~/delta_joint_cmds
  command_in_type: "speed_units"   # twist linear = m/s, angular = rad/s
  scale:
    linear: 1.0       # m/s per unit (command_in_type=speed_units: no scaling needed)
    rotational: 1.0   # rad/s per unit
    joint: 1.0        # rad/s per unit (DLS computes physical rad/s: no scaling needed)

  cartesian_command_in_topic: ~/delta_twist_cmds
  joint_command_in_topic: ~/delta_joint_cmds
  robot_link_command_frame: base_link

  ## Output: JointTrajectory forwarded to arm_controller
  command_out_type: trajectory_msgs/JointTrajectory
  publish_period: 0.05       # 20 Hz — matches uart_bridge send_rate_hz for full velocity utilization
  low_latency_mode: false
  command_out_topic: /arm_controller/joint_trajectory
  joint_topic: /joint_states

  ## Robot config (must match SRDF group and URDF end-effector link)
  move_group_name: arm
  planning_frame: base_link
  ee_frame_name: End_Effector

  ## Safety
  incoming_command_timeout: 0.5
  num_outgoing_halt_msgs_to_publish: 4
  halt_all_joints_in_joint_mode: false
  halt_all_joints_in_cartesian_mode: false

  ## Singularity protection — disabled; velocity clamping is handled by the STM32.
  lower_singularity_threshold: 1000.0
  hard_stop_singularity_threshold: 1001.0

  ## Joint limit margin (rad), extra buffer inside URDF limits
  joint_limit_margin: 0.1

  ## Collision checking (disable for performance; enable if collisions are a concern)
  use_collision_checking: false

  ## Set > 0 to cap output speed regardless of input magnitude
  override_velocity_scaling_factor: 0.0
