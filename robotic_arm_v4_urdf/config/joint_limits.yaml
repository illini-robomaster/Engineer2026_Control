default_velocity_scaling_factor: 0.1
default_acceleration_scaling_factor: 0.1

joint_limits:
  Joint1:
    has_position_limits: true
    min_position: -3.14159   # -180 deg  (joint space; motor sees ±360 deg via 2:1 gear)
    max_position:  3.14159   # +180 deg
    has_velocity_limits: true
    max_velocity: 1.2
    has_acceleration_limits: true
    max_acceleration: 1.5
  Joint2:
    has_position_limits: true
    min_position: -1.5708    # -90 deg
    max_position:  1.5708    # +90 deg
    has_velocity_limits: true
    max_velocity: 1.2
    has_acceleration_limits: true
    max_acceleration: 1.5
  Joint3:
    has_position_limits: true
    min_position: -1.20      # -68.75 deg
    max_position:  4.0       # +229.18 deg
    has_velocity_limits: true
    max_velocity: 1.2
    has_acceleration_limits: true
    max_acceleration: 1.5
  Joint4:
    has_position_limits: true
    min_position: -3.14159   # -180 deg
    max_position:  3.14159   # +180 deg
    has_velocity_limits: true
    max_velocity: 1.5
    has_acceleration_limits: true
    max_acceleration: 2.0
  Joint5:
    has_position_limits: true
    min_position: -1.5708    # -90 deg
    max_position:  1.5708    # +90 deg
    has_velocity_limits: true
    max_velocity: 1.5
    has_acceleration_limits: true
    max_acceleration: 2.0
  Joint6:
    has_position_limits: true
    min_position: -3.14159   # -180 deg
    max_position:  3.14159   # +180 deg
    has_velocity_limits: true
    max_velocity: 1.8
    has_acceleration_limits: true
    max_acceleration: 2.5
