default_velocity_scaling_factor: 1.0
default_acceleration_scaling_factor: 1.0

joint_limits:
  Joint1:
    has_position_limits: true
    min_position: -3.14159   # -180 deg
    max_position:  3.14159   # +180 deg
    has_velocity_limits: false
    max_velocity: 3.0
    has_acceleration_limits: false
    max_acceleration: 5.0
  Joint2:
    has_position_limits: true
    min_position: -1.5708    # -90 deg
    max_position:  1.5708    # +90 deg
    has_velocity_limits: false
    max_velocity: 3.0
    has_acceleration_limits: false
    max_acceleration: 5.0
  Joint3:
    has_position_limits: true
    min_position: -1.20      # -68.75 deg
    max_position:  4.0       # +229.18 deg
    has_velocity_limits: false
    max_velocity: 3.0
    has_acceleration_limits: false
    max_acceleration: 5.0
  Joint4:
    has_position_limits: true
    min_position: -3.14159   # -180 deg
    max_position:  3.14159   # +180 deg
    has_velocity_limits: false
    max_velocity: 3.0        # matches MCU ARM_VEL_LIM[3]
    has_acceleration_limits: false
    max_acceleration: 6.0
  Joint5:
    has_position_limits: true
    min_position: -2.6180    # -150 deg
    max_position:  2.6180    # +150 deg
    has_velocity_limits: false
    max_velocity: 3.0        # matches MCU ARM_VEL_LIM[4]
    has_acceleration_limits: false
    max_acceleration: 6.0
  Joint6:
    has_position_limits: true
    min_position: -3.14159   # -180 deg
    max_position:  3.14159   # +180 deg
    has_velocity_limits: false
    max_velocity: 3.6        # matches MCU ARM_VEL_LIM[5]
    has_acceleration_limits: false
    max_acceleration: 8.0
